name: terraform

# manual runs can target a specific environment via workflow_dispatch.

on:
  push:
    branches: [master]
    paths:
      - "**.tf"
      - "environments/**"
      - "src/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    branches: [master]
    paths:
      - "**.tf"
      - "environments/**"
      - "src/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        type: choice
        options: [dev, staging, prod]
        default: dev

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write        # OIDC federation to AWS
  pull-requests: write   # post the plan as a PR comment

env:
  TF_VERSION: "1.9.8"
  AWS_REGION: "us-east-1"
  # The env applied on a push to master. Point at prod once you trust the pipeline.
  DEPLOY_ENV: "staging"
  TF_IN_AUTOMATION: "true"

jobs:
  validate:
    name: fmt & validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Init (no backend)
        run: terraform init -backend=false

      - name: Validate
        run: terraform validate -no-color

  plan:
    name: plan
    needs: validate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TF_PLAN_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=haloarchives/dev/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"

      - name: Plan
        id: plan
        run: |
          terraform plan -no-color -input=false \
            -var-file=environments/dev.tfvars \
            -out=tfplan | tee plan.txt
        continue-on-error: true

      - name: Comment plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let plan = fs.readFileSync('plan.txt', 'utf8');
            const max = 60000;
            if (plan.length > max) plan = plan.slice(0, max) + '\n...output truncated...';
            const body = [
              '#### Terraform Plan `dev` — `${{ steps.plan.outcome }}`',
              '<details><summary>Show plan</summary>',
              '',
              '```terraform',
              plan,
              '```',
              '</details>',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail if plan errored
        if: steps.plan.outcome == 'failure'
        run: exit 1

  apply:
    name: apply
    needs: validate
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Resolve target environment
        id: env
        run: echo "name=${{ github.event.inputs.environment || env.DEPLOY_ENV }}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TF_APPLY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=haloarchives/${{ steps.env.outputs.name }}/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}"

      - name: Apply
        run: |
          terraform apply -auto-approve -input=false \
            -var-file=environments/${{ steps.env.outputs.name }}.tfvars
